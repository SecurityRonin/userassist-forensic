[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

[bans]
# Transitive duplicate versions (e.g. syn v1 + v2) are often unavoidable; warn, don't fail —
# matching the fleet convention (usb-forensic, mbr-partition-forensic).
multiple-versions = "warn"
wildcards = "deny"
# Intra-workspace `{ path = … }` deps appear as wildcard `*` requirements; allow
# those while still catching real wildcard registry deps.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
