# Allow `unwrap()`/`expect()` inside test functions and `#[cfg(test)]` modules.
# Production code keeps `clippy::unwrap_used = deny` (see workspace Cargo.toml);
# tests legitimately unwrap to fail loudly, so this is the upstream-recommended
# exception rather than scattering `#[allow]` across every test module.
allow-unwrap-in-tests = true
allow-expect-in-tests = true

# Windows-forensic / format names that look like code identifiers to doc_markdown.
doc-valid-idents = ["UserAssist", "ROT13", "NTUSER", "RegRipper", "FILETIME", "UEME", "UEME_CTLSESSION", "UEME_CTLCUACount", "KNOWNFOLDER", "regipy", "libyal", "winreg-kb", "dtformats", "CFReDS", "DFIR", "SecurityRonin", "SysWOW64", "System32", "MITRE", "..", "GUID"]
