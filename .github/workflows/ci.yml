name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets
      - run: cargo test --workspace

  deny:
    name: cargo-deny (bans/licenses/sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@34899fc7ba81ca6268d5947a7a16b4649013fea1 # v2.0.4
        with:
          command: check bans licenses sources

  advisories:
    name: cargo-deny (advisories)
    runs-on: ubuntu-latest
    # Informational: a malformed entry in the upstream RustSec advisory-db breaks
    # DB *loading* for the whole ecosystem and must not gate our build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@34899fc7ba81ca6268d5947a7a16b4649013fea1 # v2.0.4
        with:
          command: check advisories

  coverage:
    name: Coverage (100% lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Gate on 100% line coverage (excluding // cov:unreachable)
        run: |
          cargo llvm-cov --workspace --lib --lcov --output-path lcov.info
          # Walk the lcov: track the current source file (SF:) and fail on any
          # DA:<line>,0 whose source line lacks a `// cov:unreachable` marker.
          fail=0; file=""
          while IFS= read -r entry; do
            case "$entry" in
              SF:*) file="${entry#SF:}" ;;
              DA:*,0)
                line="${entry#DA:}"; line="${line%,0}"
                src=$(sed -n "${line}p" "$file")
                case "$src" in
                  *cov:unreachable*) ;;
                  *) echo "Uncovered (no cov:unreachable): ${file}:${line}: ${src}"; fail=1 ;;
                esac
                ;;
            esac
          done < lcov.info
          exit $fail
